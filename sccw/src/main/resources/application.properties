spring.application.name=sccw

# Server Port
server.port=8080

spring.profiles.active=local

# Google GenAI Config
# spring.ai.google.genai.project-id=${GOOGLE_CLOUD_PROJECT_ID:}
# spring.ai.google.genai.location=${GOOGLE_CLOUD_LOCATION:us-central1}
# spring.ai.google.genai.embedding.project-id=${GOOGLE_CLOUD_PROJECT_ID:}
# spring.ai.google.genai.embedding.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.model=gemini-flash-latest
spring.ai.google.genai.embedding.options.model=gemini-embedding-2
# Vector store
spring.ai.vectorstore.mariadb.table-name=ai_vector_store
spring.ai.vectorstore.mariadb.initialize-schema=false
# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/sccw_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Feedback email notifications (use an app password when using Gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Optional extra recipient in addition to Admin/Manager reviewer accounts
feedback.notification.email=${FEEDBACK_NOTIFICATION_EMAIL:}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
