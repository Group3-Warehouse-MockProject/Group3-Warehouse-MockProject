spring.application.name=sccw

# Import local configurations/secrets if present
spring.config.import=optional:classpath:application-local.properties

# Server Port
server.port=8080

# Google GenAI Config
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
spring.ai.google.genai.embedding.options.model=text-embedding-004
# Vector store (MySQL)
spring.ai.vectorstore.mariadb.table-name=ai_vector_store
spring.ai.vectorstore.mariadb.initialize-schema=true

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/sccw_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method